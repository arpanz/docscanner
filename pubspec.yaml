name: docscanner
description: "A minimal, fast, and aesthetically pleasing document scanner."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  intl: ^0.20.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^17.1.0

  # Camera & scanning
  flutter_doc_scanner: ^0.0.18

  # Image processing
  image_picker: ^1.1.2
  image: ^4.2.0
  flutter_image_compress: ^2.3.0

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1

  # Database
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.4
  path: ^1.9.0
  uuid: ^4.5.1

  # Permissions & sharing
  permission_handler: ^12.0.1
  share_plus: ^12.0.1

  # OCR
  google_mlkit_text_recognition: ^0.15.1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.28.0
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
