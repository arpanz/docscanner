name: docscanner
description: "A minimal, fast, and aesthetically pleasing document scanner."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0+3

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Camera & scanning
  camera: ^0.11.0+2
  flutter_doc_scanner: ^0.0.9

  # Image processing
  image: ^4.2.0
  flutter_image_compress: ^2.3.0

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1

  # Database
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Permissions & sharing
  permission_handler: ^11.3.1
  share_plus: ^10.0.0

  # OCR
  google_mlkit_text_recognition: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.2
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
